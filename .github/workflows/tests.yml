name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run unit tests
        run: |
          python3 -m unittest test_auto_wake -v

      - name: Smoke import check
        run: |
          python3 -c "import ast; [ast.parse(open(f).read()) for f in __import__('glob').glob('bin/**/*.py', recursive=True)]"
          echo "✅ All Python files parse cleanly"

      - name: Lint with pyflakes
        run: |
          pip install pyflakes
          pyflakes bin/ test_auto_wake.py